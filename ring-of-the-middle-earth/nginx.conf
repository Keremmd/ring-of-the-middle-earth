events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream game_backend {
        server go-1:8080;
    }

    server {
        listen 80;

        # SSE — disable buffering
        location /events {
            proxy_pass http://game_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            chunked_transfer_encoding on;
        }

        # API endpoints — proxy to Go backend (exact paths only, not .js/.css files)
        location /game/start    { proxy_pass http://game_backend; proxy_set_header Host $host; }
        location /game/state    { proxy_pass http://game_backend; proxy_set_header Host $host; }
        location /order         { proxy_pass http://game_backend; proxy_set_header Host $host; }
        location /orders/       { proxy_pass http://game_backend; proxy_set_header Host $host; }
        location /analysis/     { proxy_pass http://game_backend; proxy_set_header Host $host; }
        location /health        { proxy_pass http://game_backend; proxy_set_header Host $host; }

        # Static UI files
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ =404;
        }
    }
}
